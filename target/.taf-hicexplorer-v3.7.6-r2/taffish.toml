[package]
name = "hicexplorer"
kind = "tool"
version = "3.7.6"
release = 2
license = "Apache-2.0"
main = "src/main.taf"

[meta]
domain = "bio"
categories = ["hic", "chromatin", "genomics", "visualization", "quality-control"]
keywords = ["hicexplorer", "Hi-C", "capture-Hi-C", "Micro-C", "contact-matrix", "cooler", "hicmatrix", "TAD", "loops", "compartments", "visualization"]
description = "HiCExplorer command-line suite for processing, normalizing, analyzing, converting, and visualizing Hi-C, capture Hi-C, and Micro-C contact matrices."

[repository]
url = "https://github.com/taffish/hicexplorer"

[command]
name = "taf-hicexplorer"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/hicexplorer:3.7.6-r2"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64,linux/arm64"

[upstream]
name = "HiCExplorer"
type = "github"
repo = "deeptools/HiCExplorer"
homepage = "https://hicexplorer.readthedocs.io/"
release_url = "https://github.com/deeptools/HiCExplorer/releases/tag/3.7.6"
downloads = "https://github.com/deeptools/HiCExplorer/archive/refs/tags/3.7.6.tar.gz"
version = "3.7.6"
license = "GPL-3.0-or-later"
citation = "Wolff et al. 2020; Wolff et al. 2018; Ramirez et al. 2018"
doi = "10.1093/nar/gkaa220"
pmid = "32301980"
watch = "tags"
strip_prefix = ""

[smoke]
backend = "docker"
timeout = 300
exist = ["hicexplorer", "hicFindRestSite", "hicAggregateContacts", "hicBuildMatrix", "hicBuildMatrixMicroC", "hicCorrectMatrix", "hicCorrelate", "hicFindTADs", "hicMergeMatrixBins", "hicPlotMatrix", "hicPlotDistVsCounts", "hicPlotTADs", "hicSumMatrices", "hicInfo", "hicQC", "hicCompareMatrices", "hicPCA", "hicTransform", "hicPlotViewpoint", "chicViewpointBackgroundModel", "chicPlotViewpoint", "chicViewpoint", "chicAggregateStatistic", "chicDifferentialTest", "chicQualityControl", "chicSignificantInteractions", "hicConvertFormat", "hicAdjustMatrix", "hicNormalize", "hicAverageRegions", "hicPlotAverageRegions", "hicDetectLoops", "hicValidateLocations", "hicMergeLoops", "hicCompartmentalization", "hicQuickQC", "hicPlotSVL", "hicCreateThresholdFile", "hicHyperoptDetectLoops", "hicHyperoptDetectLoopsHiCCUPS", "hicMergeDomains", "hicDifferentialTAD", "chicExportData", "hicInterIntraTAD", "hicTADClassifier", "hicTrainTADClassifier", "python", "samtools", "bedtools", "dot"]
test = ["hicexplorer --version 2>&1 | grep -F '3.7.6' >/dev/null", "hicexplorer --help 2>&1 | grep -F 'hicBuildMatrix' >/dev/null && hicexplorer --help 2>&1 | grep -F 'hicPlotMatrix' >/dev/null && hicexplorer --help 2>&1 | grep -F 'chicViewpoint' >/dev/null", "hicInfo --version 2>&1 | grep -F '3.7.6' >/dev/null && hicBuildMatrix --version 2>&1 | grep -F '3.7.6' >/dev/null && hicBuildMatrixMicroC --version 2>&1 | grep -F '3.7.6' >/dev/null && hicConvertFormat --version 2>&1 | grep -F '3.7.6' >/dev/null && hicPlotMatrix --version 2>&1 | grep -F '3.7.6' >/dev/null && chicViewpoint --version 2>&1 | grep -F '3.7.6' >/dev/null", "hicBuildMatrix --help 2>&1 | grep -F 'usage:' >/dev/null && hicBuildMatrixMicroC --help 2>&1 | grep -F 'usage:' >/dev/null && hicCorrectMatrix --help 2>&1 | grep -F 'usage:' >/dev/null && hicPlotTADs --help 2>&1 | grep -F 'usage:' >/dev/null && hicConvertFormat --help 2>&1 | grep -F 'usage:' >/dev/null", "python -c 'import hicexplorer, hicmatrix, cooler, pybedtools, pyBigWig, pysam, sklearn, matplotlib, graphviz'", "samtools --version | grep -F 'samtools 1.23.1' >/dev/null && bedtools --version | grep -F 'v2.31.1' >/dev/null && dot -V 2>&1 | grep -F 'graphviz' >/dev/null", "mkdir -p /tmp/taf-hicexplorer-rest && cd /tmp/taf-hicexplorer-rest && printf '>chr1\\nAAAAGATCAAAAGATCTTTT\\n' > genome.fa && hicFindRestSite --fasta genome.fa --searchPattern GATC --outFile sites.bed && test -s sites.bed && grep -F 'chr1' sites.bed >/dev/null", "mkdir -p /tmp/taf-hicexplorer-cool && cd /tmp/taf-hicexplorer-cool && python -c 'import cooler, pandas as pd; bins = pd.DataFrame({\"chrom\": [\"chr1\", \"chr1\"], \"start\": [0, 1000], \"end\": [1000, 2000]}); pixels = pd.DataFrame({\"bin1_id\": [0, 0, 1], \"bin2_id\": [0, 1, 1], \"count\": [5, 2, 3]}); cooler.create_cooler(\"tiny.cool\", bins=bins, pixels=pixels, ordered=True)' && hicInfo --matrices tiny.cool | grep -F 'tiny.cool' >/dev/null && hicPlotMatrix --matrix tiny.cool --outFileName tiny.png >/dev/null && test -s tiny.png && hicConvertFormat --matrices tiny.cool --inputFormat cool --outputFormat h5 --outFileName tiny.h5 >/dev/null && test -s tiny.h5 && hicInfo --matrices tiny.h5 | grep -F 'tiny.h5' >/dev/null"]
